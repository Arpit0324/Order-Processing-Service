# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Full local development stack for Order Processing System
# Run:   docker-compose up --build
# Stop:  docker-compose down
# Reset: docker-compose down -v   (wipes all volumes)
# ─────────────────────────────────────────────────────────────────────────────

name: order-processing-system

# ── Re-usable env block injected into every app service ─────────────────────
x-service-env: &service-env
  KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
  REDIS_HOST:      ${REDIS_HOST:-redis}
  REDIS_PORT:      ${REDIS_PORT:-6379}
  JWT_PUBLIC_KEY:  ${JWT_PUBLIC_KEY:-classpath:keys/public.pem}

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:               ${POSTGRES_USER:-ops}
      POSTGRES_PASSWORD:           ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:                 ops_orders          # default DB (required by image)
      POSTGRES_MULTIPLE_DATABASES: ops_orders,ops_inventory,ops_notifications
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops} -d ops_orders"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID:                          1
      KAFKA_PROCESS_ROLES:                    broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS:         1@kafka:9093
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:        CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "false"
      # Required for KRaft: generate once with kafka-storage random-uuid
      CLUSTER_ID:                             "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL",
             "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    # One-shot: creates all topics then exits (condition: service_completed_successfully)
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Creating Kafka topics...' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.created           --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.cancelled         --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.cancel.requested  --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.return.requested  --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.returned          --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic inventory.updated       --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic notif.sent              --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic order.created.DLT       --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic refund.requested        --partitions 1 --replication-factor 1 &&
        echo 'All 9 topics created successfully.'
      "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             local-ops
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY:         "false"
      KAFKA_CLUSTERS_0_CONSUMER_GROUPS_FETCH_PERIOD_MILLIS: 5000
      KAFKA_CLUSTERS_0_DEFAULTKEYSERDE:  String
      KAFKA_CLUSTERS_0_DEFAULTVALUESERDE: String
      AUTH_TYPE:                         LOGIN_FORM
      SPRING_SECURITY_USER_NAME:         admin
      SPRING_SECURITY_USER_PASSWORD:     admin
      DYNAMIC_CONFIG_ENABLED:            "true"

  # ── Application Services ──────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE:            local
      SERVER_PORT:                       8080
      ORDER_SERVICE_URL:                 http://order-service:8081
      INVENTORY_SERVICE_URL:             http://inventory-service:8082
      NOTIFICATION_SERVICE_URL:          http://notification-service:8083
      SPRING_DATA_REDIS_HOST:            ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT:            ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${ORDER_PORT:-8081}:8081"
    environment:
      <<: *service-env
      DB_URL:      jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/ops_orders
      DB_USER:     ${POSTGRES_USER:-ops}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      HTTP_PORT:   8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${INVENTORY_PORT:-8082}:8082"
    environment:
      <<: *service-env
      DB_URL:      jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/ops_inventory
      DB_USER:     ${POSTGRES_USER:-ops}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      HTTP_PORT:   8082
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "${NOTIFICATION_PORT:-8083}:8083"
    environment:
      <<: *service-env
      SPRING_PROFILES_ACTIVE:             local
      SERVER_PORT:                        8083
      SPRING_DATASOURCE_URL:              jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/ops_notifications
      SPRING_DATASOURCE_USERNAME:         ${POSTGRES_USER:-ops}
      SPRING_DATASOURCE_PASSWORD:         ${POSTGRES_PASSWORD:-changeme}
      SPRING_KAFKA_BOOTSTRAP_SERVERS:     ${KAFKA_BOOTSTRAP:-kafka:9092}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ── Named volumes (persist across docker-compose down) ───────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# ── Explicit bridge network ───────────────────────────────────────────────────
networks:
  default:
    name: ops-network
    driver: bridge
