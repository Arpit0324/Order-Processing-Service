# order-service/src/main/resources/application.conf
# ─────────────────────────────────────────────────────────────────────────────

http {
  host = "0.0.0.0"
  port = 8081
  port = ${?HTTP_PORT}
}

db {
  url      = "jdbc:postgresql://localhost:5432/ops_orders"
  url      = ${?DB_URL}
  user     = "ops"
  user     = ${?DB_USER}
  password = "changeme"
  password = ${?DB_PASSWORD}

  hikari {
    maximumPoolSize   = 20
    minimumIdle       = 5
    connectionTimeout = 5000
    idleTimeout       = 600000
    maxLifetime       = 1800000
  }
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP}
}

pekko {
  actor {
    provider = "local"

    serialization-bindings {
      "com.ops.order.domain.OrderEvent" = jackson-json
      "com.ops.order.actor.OrderState"  = jackson-json
    }
  }

  persistence {
    journal {
      plugin = "jdbc-journal"
      auto-start-journals = ["jdbc-journal"]
    }
    snapshot-store {
      plugin = "jdbc-snapshot-store"
      auto-start-snapshot-stores = ["jdbc-snapshot-store"]
    }
  }

  # Pekko HTTP server settings
  http.server {
    idle-timeout        = 60s
    request-timeout     = 30s
    max-connections     = 1024
  }

  loggers          = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel         = "INFO"
  logging-filter   = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
}

# akka-persistence-jdbc journal plugin config
jdbc-journal {
  slick = ${slick}
}
jdbc-snapshot-store {
  slick = ${slick}
}
jdbc-read-journal {
  slick = ${slick}
}

slick {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    host     = "localhost"
    host     = ${?POSTGRES_HOST}
    url      = ${db.url}
    user     = ${db.user}
    password = ${db.password}
    driver   = "org.postgresql.Driver"
    numThreads    = 20
    maxConnections = 20
    minConnections = 5
  }
}
