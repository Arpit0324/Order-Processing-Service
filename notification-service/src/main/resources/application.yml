spring:
  application:
    name: notification-service

  datasource:
    url:      jdbc:postgresql://localhost:5432/ops_notifications
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ops_notifications}
    username: ${SPRING_DATASOURCE_USERNAME:ops}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:    10
      minimum-idle:         3
      connection-timeout:   5000
      idle-timeout:         600000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema — never let Hibernate alter it
    open-in-view: false           # prevent lazy-loading issues in web layer
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled:             true
    locations:           classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order:        false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id:         notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks:             all         # wait for all replicas to acknowledge
      retries:          3
    listener:
      ack-mode: MANUAL_IMMEDIATE    # commit offset only after handler completes

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

akka:
  actor:
    provider: local
  loggers:
    - akka.event.slf4j.Slf4jLogger
  loglevel: INFO
  logging-filter: akka.event.slf4j.Slf4jLoggingFilter
