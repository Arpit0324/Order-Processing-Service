# inventory-service/src/main/resources/application.conf

http {
  host = "0.0.0.0"
  port = 8082
  port = ${?HTTP_PORT}
}

db {
  url      = "jdbc:postgresql://localhost:5432/ops_inventory"
  url      = ${?DB_URL}
  user     = "ops"
  user     = ${?DB_USER}
  password = "changeme"
  password = ${?DB_PASSWORD}

  hikari {
    maximumPoolSize   = 20
    minimumIdle       = 5
    connectionTimeout = 5000
    idleTimeout       = 600000
    maxLifetime       = 1800000
  }
}

redis {
  host    = "localhost"
  host    = ${?REDIS_HOST}
  port    = 6379
  port    = ${?REDIS_PORT}
  ttlSecs = 300
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP}
}

pekko {
  actor {
    provider = "local"
  }

  kafka {
    consumer {
      stop-timeout = 30s
      close-timeout = 20s
      commit-timeout = 15s
      poll-interval = 50ms
      poll-timeout = 50ms
    }
    committer {
      max-batch    = 500
      max-interval = 5s
      parallelism  = 1
    }
  }

  http.server {
    idle-timeout    = 60s
    request-timeout = 30s
  }

  loggers        = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel       = "INFO"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
}

slick {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    url           = ${db.url}
    user          = ${db.user}
    password      = ${db.password}
    driver        = "org.postgresql.Driver"
    numThreads    = 20
    maxConnections = 20
    minConnections = 5
  }
}
