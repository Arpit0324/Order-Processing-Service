# API Gateway — LoadBalancer (accepts external traffic)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ops-system
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# Order Service — ClusterIP (internal only)
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ops-system
  labels:
    app: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
# Inventory Service — ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: ops-system
  labels:
    app: inventory-service
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
# Notification Service — ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ops-system
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
