# ── IMPORTANT: In production, do NOT store real secrets here ─────────────────
# Use one of:
#   a) external-secrets-operator (pulls from AWS Secrets Manager / Vault)
#   b) Sealed Secrets (encrypted at rest in git)
#   c) Vault Agent Injector
#
# The base64 values below are PLACEHOLDERS — replace before deploying.
# Generate: echo -n "your-secret" | base64
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: ops-system
type: Opaque
data:
  # echo -n "ops" | base64        → b3Bz
  # echo -n "changeme" | base64  → Y2hhbmdlbWU=
  POSTGRES_USER:     b3Bz
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  DB_USER:           b3Bz
  DB_PASSWORD:       Y2hhbmdlbWU=
  SPRING_DATASOURCE_USERNAME: b3Bz
  SPRING_DATASOURCE_PASSWORD: Y2hhbmdlbWU=
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: ops-system
type: Opaque
data:
  # base64-encoded RS256 public key (DER format, no PEM headers)
  JWT_PUBLIC_KEY: UExBQ0VIT0xERVI=   # PLACEHOLDER — replace with real key
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: ops-system
type: Opaque
data:
  REDIS_PASSWORD: ""   # empty = no auth (set if Redis AUTH is enabled)
