apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ops-system
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight actor operations to complete
      containers:
        - name: order-service
          image: ops/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu:    500m
              memory: 512Mi
            limits:
              cpu:    "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds:       5
            failureThreshold:    3
          envFrom:
            - configMapRef: { name: order-service-config }
            - secretRef:    { name: db-credentials }
