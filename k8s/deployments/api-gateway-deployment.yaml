apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ops-system
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0    # zero-downtime: always keep current replicas alive
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: ops/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu:    250m
              memory: 256Mi
            limits:
              cpu:    500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds:       10
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
          envFrom:
            - configMapRef: { name: gateway-config }
            - secretRef:    { name: jwt-secret }
            - secretRef:    { name: redis-auth }
