apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ops-system
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification-service
          image: ops/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          resources:
            requests:
              cpu:    250m
              memory: 256Mi
            limits:
              cpu:    500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
          envFrom:
            - configMapRef: { name: notification-service-config }
            - secretRef:    { name: db-credentials }
