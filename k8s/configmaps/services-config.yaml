apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ops-system
data:
  HTTP_PORT:       "8081"
  DB_URL:          "jdbc:postgresql://postgres-service:5432/ops_orders"
  KAFKA_BOOTSTRAP: "kafka-service:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: ops-system
data:
  HTTP_PORT:       "8082"
  DB_URL:          "jdbc:postgresql://postgres-service:5432/ops_inventory"
  KAFKA_BOOTSTRAP: "kafka-service:9092"
  REDIS_HOST:      "redis-service"
  REDIS_PORT:      "6379"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: ops-system
data:
  SERVER_PORT:                    "8083"
  SPRING_DATASOURCE_URL:          "jdbc:postgresql://postgres-service:5432/ops_notifications"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: ops-system
data:
  SERVER_PORT:              "8080"
  ORDER_SERVICE_URL:        "http://order-service:8081"
  INVENTORY_SERVICE_URL:    "http://inventory-service:8082"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8083"
  REDIS_HOST:               "redis-service"
  REDIS_PORT:               "6379"
